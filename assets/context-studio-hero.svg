<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Codex Context Studio</title>
  <desc id="desc">A dark green visual editor interface with context cards, token metrics, and safety checks.</desc>
